<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:24px;background:var(--bg-surface);font-family:var(--font-body);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.tile{border:1px solid var(--border-default);border-radius:var(--radius-md);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:120px;}
.tile--dark{background:#0F172A;}
.tile--dark .lbl{color:rgba(255,255,255,.7);}
.lbl{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{width:38px;height:38px;}
.brand .word{font-family:var(--font-display);font-weight:700;font-size:32px;letter-spacing:-.01em;color:var(--text-primary);}
.brand .word i{color:var(--brand-red);font-style:normal;}
.brand--white .word{color:#fff;}
</style></head><body>
<div class="grid">
  <div class="tile">
    <div class="brand"><img src="../assets/logo-mark.svg" alt=""><span class="word">sehat<i>UP</i></span></div>
    <div class="lbl">Primary lockup · light</div>
  </div>
  <div class="tile tile--dark">
    <div class="brand brand--white"><img src="../assets/logo-mark.svg" alt=""><span class="word">sehat<i>UP</i></span></div>
    <div class="lbl">Reversed on dark</div>
  </div>
  <div class="tile">
    <img src="../assets/logo-mark.svg" width="56" height="56" alt="">
    <div class="lbl">Standalone mark</div>
  </div>
  <div class="tile" style="background:var(--brand-red);">
    <img src="../assets/logo-mark.svg" width="56" height="56" alt="" style="filter:brightness(0) invert(1);">
    <div class="lbl" style="color:rgba(255,255,255,.85);">Knockout · brand red</div>
  </div>
</div>
</body></html>
