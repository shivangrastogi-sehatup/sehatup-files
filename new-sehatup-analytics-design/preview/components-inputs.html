<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>body{padding:20px;background:var(--bg-surface);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;}
</style></head><body>
<div class="grid">
  <div class="input-field">
    <label>Email address</label>
    <div class="input-wrap">
      <span class="lead-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
      <input class="input input--with-icon" placeholder="name@sehatup.com" value="shivang@sehatup.com">
    </div>
  </div>
  <div class="input-field">
    <label>Portal role</label>
    <select class="select">
      <option>Patient / User</option>
      <option>Medical Professional</option>
      <option>Performance Marketer</option>
      <option selected>System Administrator</option>
    </select>
  </div>
  <div class="input-field">
    <label>Password</label>
    <div class="input-wrap">
      <span class="lead-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      <input class="input input--with-icon" type="password" value="●●●●●●●●">
    </div>
  </div>
  <div class="input-field">
    <label>Search submissions</label>
    <div class="input-wrap">
      <span class="lead-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="input input--with-icon" placeholder="Name, phone, or symptom…">
    </div>
  </div>
  <div class="input-field">
    <label>Date range</label>
    <input class="input" value="01 Mar – 12 May 2026">
  </div>
  <div class="input-field">
    <label>Disabled</label>
    <input class="input" value="Locked field" disabled>
  </div>
</div>
</body></html>
