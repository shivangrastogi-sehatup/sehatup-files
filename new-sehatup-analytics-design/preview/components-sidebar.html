<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Sidebar nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
body{padding:20px;background:var(--bg-app);font-family:var(--font-body);}
.nav{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);width:260px;padding:14px 10px;}
.nav__brand{display:flex;align-items:center;gap:8px;padding:6px 10px 14px;border-bottom:1px solid var(--border-default);margin-bottom:10px;}
.nav__brand .word{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.01em;color:var(--text-primary);}
.nav__brand .word i{color:var(--brand-red);font-style:normal;}
.nav__section{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;padding:10px 12px 4px;}
.nav__item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:14px;font-weight:500;cursor:pointer;}
.nav__item:hover{background:var(--bg-app);color:var(--text-primary);}
.nav__item--active{background:var(--brand-red-soft);color:var(--brand-red-700);font-weight:600;}
.nav__item--active svg{stroke:var(--brand-red);}
.nav__item .count{margin-left:auto;font-size:11px;background:var(--slate-200);color:var(--text-secondary);padding:1px 7px;border-radius:var(--radius-pill);font-weight:600;}
.nav__item--active .count{background:var(--brand-red);color:#fff;}
</style></head><body>
<nav class="nav">
  <div class="nav__brand"><img src="../assets/logo-mark.svg" width="22" height="22" alt=""><span class="word">sehat<i>UP</i> Care</span></div>
  <div class="nav__section">Workspace</div>
  <div class="nav__item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </div>
  <div class="nav__item nav__item--active">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Patients <span class="count">128</span>
  </div>
  <div class="nav__item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Submissions <span class="count">42</span>
  </div>
  <div class="nav__item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
    Analytics
  </div>
  <div class="nav__section">Administer</div>
  <div class="nav__item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9 1.65 1.65 0 0 0 4.27 7.18l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.36.146.67.388.9.7"/></svg>
    Roles & access
  </div>
</nav>
</body></html>
