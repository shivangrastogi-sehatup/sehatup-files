<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii & shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{padding:24px;background:var(--bg-app);}
.section{margin-bottom:18px;}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.lbl{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--text-primary);}
.tile{background:#fff;border:1px solid var(--border-default);width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);}
.tile.sh{border:none;}
.cap{font-family:var(--font-body);font-size:11px;color:var(--text-secondary);margin-top:4px;text-align:center;display:block;}
.col{display:flex;flex-direction:column;align-items:center;gap:4px;}
</style>
</head><body>
<div class="section">
  <div class="lbl" style="margin-bottom:10px;">Radii</div>
  <div class="row">
    <div class="col"><div class="tile" style="border-radius:var(--radius-xs)">4</div><span class="cap">xs · chip</span></div>
    <div class="col"><div class="tile" style="border-radius:var(--radius-sm)">8</div><span class="cap">sm · input</span></div>
    <div class="col"><div class="tile" style="border-radius:var(--radius-md)">12</div><span class="cap">md · card</span></div>
    <div class="col"><div class="tile" style="border-radius:var(--radius-lg)">16</div><span class="cap">lg · modal</span></div>
    <div class="col"><div class="tile" style="border-radius:var(--radius-xl)">20</div><span class="cap">xl · banner</span></div>
    <div class="col"><div class="tile" style="border-radius:var(--radius-pill)">∞</div><span class="cap">pill · avatar</span></div>
  </div>
</div>
<div class="section">
  <div class="lbl" style="margin-bottom:10px;">Shadows (elevation)</div>
  <div class="row">
    <div class="col"><div class="tile sh" style="box-shadow:var(--shadow-xs);border-radius:var(--radius-md);background:#fff;">xs</div><span class="cap">button</span></div>
    <div class="col"><div class="tile sh" style="box-shadow:var(--shadow-sm);border-radius:var(--radius-md);background:#fff;">sm</div><span class="cap">card</span></div>
    <div class="col"><div class="tile sh" style="box-shadow:var(--shadow-md);border-radius:var(--radius-md);background:#fff;">md</div><span class="cap">dropdown</span></div>
    <div class="col"><div class="tile sh" style="box-shadow:var(--shadow-lg);border-radius:var(--radius-md);background:#fff;">lg</div><span class="cap">modal</span></div>
    <div class="col"><div class="tile sh" style="box-shadow:var(--shadow-xl);border-radius:var(--radius-md);background:#fff;">xl</div><span class="cap">overlay peak</span></div>
    <div class="col"><div class="tile sh" style="box-shadow:var(--shadow-focus);border-radius:var(--radius-md);background:#fff;border:1px solid var(--brand-red);">focus</div><span class="cap">a11y ring</span></div>
  </div>
</div>
</body></html>
