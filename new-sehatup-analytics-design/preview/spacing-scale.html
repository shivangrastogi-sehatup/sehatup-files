<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:20px;background:var(--bg-surface);font-family:var(--font-body);}
.row{display:grid;grid-template-columns:80px 1fr 80px;align-items:center;gap:14px;padding:5px 0;}
.tok{font-weight:700;font-size:13px;color:var(--text-primary);}
.bar{height:14px;border-radius:4px;background:var(--brand-red);}
.bar--ghost{background:var(--brand-red-soft);}
.val{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);text-align:right;}
</style></head><body>
<div class="row"><span class="tok">space-1</span><span class="bar" style="width:4px;"></span><span class="val">4 px</span></div>
<div class="row"><span class="tok">space-2</span><span class="bar" style="width:8px;"></span><span class="val">8 px</span></div>
<div class="row"><span class="tok">space-3</span><span class="bar" style="width:12px;"></span><span class="val">12 px</span></div>
<div class="row"><span class="tok">space-4</span><span class="bar" style="width:16px;"></span><span class="val">16 px</span></div>
<div class="row"><span class="tok">space-5</span><span class="bar" style="width:20px;"></span><span class="val">20 px</span></div>
<div class="row"><span class="tok">space-6</span><span class="bar" style="width:24px;"></span><span class="val">24 px</span></div>
<div class="row"><span class="tok">space-8</span><span class="bar" style="width:32px;"></span><span class="val">32 px</span></div>
<div class="row"><span class="tok">space-10</span><span class="bar" style="width:40px;"></span><span class="val">40 px</span></div>
<div class="row"><span class="tok">space-12</span><span class="bar bar--ghost" style="width:48px;"></span><span class="val">48 px</span></div>
<div class="row"><span class="tok">space-16</span><span class="bar bar--ghost" style="width:64px;"></span><span class="val">64 px</span></div>
</body></html>
