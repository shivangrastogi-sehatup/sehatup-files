<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:20px;background:var(--bg-surface);font-family:var(--font-body);}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.sw{height:88px;border-radius:8px;border:1px solid rgba(0,0,0,.06);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;}
.sw .step{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.85;}
.sw .hex{font-family:var(--font-mono);font-size:11px;}
.sw--lt{color:var(--text-primary);}
.lbl{font-family:var(--font-body);font-weight:700;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px;}
</style></head><body>
<div class="lbl">SehatUp Red (primary brand)</div>
<div class="grid">
  <div class="sw sw--lt" style="background:#FFF1F2"><span class="step">50</span><span class="hex">#FFF1F2</span></div>
  <div class="sw sw--lt" style="background:#FFE4E6"><span class="step">100</span><span class="hex">#FFE4E6</span></div>
  <div class="sw sw--lt" style="background:#FECDD3"><span class="step">200</span><span class="hex">#FECDD3</span></div>
  <div class="sw" style="background:#FB7185"><span class="step">400</span><span class="hex">#FB7185</span></div>
  <div class="sw" style="background:#F43F5E"><span class="step">500</span><span class="hex">#F43F5E</span></div>
  <div class="sw" style="background:#E11D48"><span class="step">600</span><span class="hex">#E11D48</span></div>
  <div class="sw" style="background:#9F1239"><span class="step">800</span><span class="hex">#9F1239</span></div>
</div>
<div class="lbl">Slate (neutrals · CRM workhorses)</div>
<div class="grid">
  <div class="sw sw--lt" style="background:#F8FAFC"><span class="step">50</span><span class="hex">#F8FAFC</span></div>
  <div class="sw sw--lt" style="background:#F1F5F9"><span class="step">100</span><span class="hex">#F1F5F9</span></div>
  <div class="sw sw--lt" style="background:#E2E8F0"><span class="step">200</span><span class="hex">#E2E8F0</span></div>
  <div class="sw sw--lt" style="background:#CBD5E1"><span class="step">300</span><span class="hex">#CBD5E1</span></div>
  <div class="sw" style="background:#64748B"><span class="step">500</span><span class="hex">#64748B</span></div>
  <div class="sw" style="background:#334155"><span class="step">700</span><span class="hex">#334155</span></div>
  <div class="sw" style="background:#0F172A"><span class="step">900</span><span class="hex">#0F172A</span></div>
</div>
</body></html>
