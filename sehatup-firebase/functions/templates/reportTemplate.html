<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .content {
            margin: 20px 0;
        }

        .field {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }

        .field-label {
            font-weight: bold;
            color: #333;
        }

        .field-value {
            margin-top: 5px;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ed1c24; padding-bottom: 10px; margin-bottom: 20px;">
        <img src="{{logoBase64}}" alt="SehatUp" style="height: 48px;">
        <h1 style="margin: 0; color: #ed1c24; font-size: 24px;">Medical Report</h1>
    </div>
    <div class="content">
        <div class="field">
            Your Health Score is : {{healthScore}}
        </div>

        {{#each fields}}
        <div class="field">
            <div class="field-label">{{label}}</div>
            <div class="field-value">{{value}}</div>
        </div>
        {{/each}}
    </div>
</body>

</html>
